<?xml version="1.0" encoding="UTF-8"?>
<!-- Health Ledger — elegant lockup. Mark + "Health Ledger" wordmark + tagline. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60" role="img" aria-label="Health Ledger">
  <!-- Mark -->
  <rect x="4" y="6" width="48" height="48" rx="13" fill="#0A2E9E"/>
  <g stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" fill="none" transform="translate(4,6)">
    <line x1="14" y1="15" x2="14" y2="33"/>
    <line x1="24" y1="15" x2="24" y2="33"/>
    <line x1="14" y1="24" x2="24" y2="24"/>
    <line x1="24" y1="33" x2="34" y2="33"/>
  </g>
  <circle cx="41" cy="17" r="1.8" fill="#14C295"/>
  <!-- Wordmark: Health Ledger -->
  <text x="68" y="34" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="500" font-size="22" letter-spacing="-0.8" fill="#1D1D1F">Health Ledger</text>
  <circle cx="208" cy="33" r="2.5" fill="#14C295"/>
  <text x="68" y="50" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="400" font-size="10" letter-spacing="1.5" fill="#6E6E73">MOBILE ALTENZAHNHEILKUNDE</text>
</svg>
