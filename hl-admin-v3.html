/* === ARCHIVE PAGE === */
function renderArchiv(){
  var at=S.archivTab||'abgerechnet';
  var q=(S.archivSearch||'').toLowerCase().trim();
  var odList=overduePatients();
  var MONTH_NAMES=['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  var h='<div class="header"><div class="header-inner">'
    +'<div><h1>Archive</h1><div class="sub">Abgerechnete Patienten</div></div>'
    +MENU_BTN
  +'</div></div>';
  h+='<div class="archiv-search-bar">'
    +'<input class="archiv-search-input" type="search" placeholder="Suche in Archive\u2026" value="'+q.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'" oninput="S.archivSearch=this.value;render()">'
  +'</div>';
  if(!q){
    h+='<div class="einv-tabs">'
      +'<button class="einv-tab'+(at==='abgerechnet'?' active':'')+'" onclick="S.archivTab=\'abgerechnet\';render()">Abgerechnet</button>'
      +'<button class="einv-tab'+(at==='unbeantwortet'?' active':'')+'" onclick="S.archivTab=\'unbeantwortet\';render()">Unbeantwortet'
        +(odList.length?'<span class="einv-badge">'+odList.length+'</span>':'')
      +'</button>'
    +'</div>';
  }
  h+='<div class="content">';
  if(q){
    var allRecs=ARCHIV.map(function(p){return Object.assign({},p,{_source:'abgerechnet'});})
      .concat(odList.map(function(p){return Object.assign({},p,{_source:'unbeantwortet'});}));
    var results=allRecs.filter(function(p){return(p.name+' '+p.heim).toLowerCase().indexOf(q)!==-1;});
    if(!results.length){
      h+='<div style="padding:40px;text-align:center;color:var(--text-4);font-size:12px;font-style:italic">Keine Ergebnisse</div>';
    } else {
      h+='<div style="padding:10px 16px 4px">';
      results.forEach(function(p){h+=renderArchivCard(p);});
      h+='</div>';
    }
  } else if(at==='abgerechnet'){
    var years=uniqSorted(ARCHIV.map(function(p){return p.archivedDate.substr(0,4);}));
    if(!years.length){
      h+='<div style="padding:40px;text-align:center;color:var(--text-4);font-size:12px;font-style:italic">Noch keine archivierten Eintr\u00e4ge</div>';
    } else {
      var cy=S.archivYear||(years[years.length-1]);
      var yearRecs=ARCHIV.filter(function(p){return p.archivedDate.substr(0,4)===cy;});
      var usedMonths=uniqSorted(yearRecs.map(function(p){return p.archivedDate.substr(5,2);}));
      var cm=S.archivMonth;
      var finalRecs=cm?yearRecs.filter(function(p){return p.archivedDate.substr(5,2)===cm;}):yearRecs;
      h+='<div class="archiv-year-tabs">';
      years.forEach(function(y){h+='<button class="archiv-year-btn'+(cy===y?' active':'')+'" onclick="S.archivYear=\''+y+'\';S.archivMonth=null;render()">'+y+'</button>';});
      h+='</div>';
      h+='<div class="archiv-month-tabs">'
        +'<button class="archiv-month-btn'+(cm===null?' active':'')+'" onclick="S.archivMonth=null;render()">Alle ('+yearRecs.length+')</button>';
      usedMonths.forEach(function(m){
        var cnt=yearRecs.filter(function(p){return p.archivedDate.substr(5,2)===m;}).length;
        h+='<button class="archiv-month-btn'+(cm===m?' active':'')+'" onclick="S.archivMonth=\''+m+'\';render()">'+MONTH_NAMES[parseInt(m)-1]+' ('+cnt+')</button>';
      });
      h+='</div>';
      if(!finalRecs.length){
        h+='<div style="padding:40px;text-align:center;color:var(--text-4);font-size:12px;font-style:italic">Keine Eintr\u00e4ge</div>';
      } else {
        h+='<div style="padding:10px 16px 4px">';
        finalRecs.forEach(function(p){h+=renderArchivCard(Object.assign({},p,{_source:'abgerechnet'}));});
        h+='</div>';
      }
    }
  } else {
    if(!odList.length){
      h+='<div style="padding:40px;text-align:center;color:var(--text-4);font-size:12px;font-style:italic">Keine \u00fcberf\u00e4lligen Eintr\u00e4ge</div>';
    } else {
      h+='<div style="padding:10px 16px 4px">';
      odList.forEach(function(p){h+=renderArchivCard(Object.assign({},p,{_source:'unbeantwortet'}));});
      h+='</div>';
    }
  }
  h+='</div>';
  h+=renderBottomNav('archiv');
  return h;
}

/* === RENDER === */
function render(){
  var app=document.getElementById('app');
  if(S.screen==='login'){app.innerHTML=renderLogin();return;}
  if(S.mode==='klinik'){renderKlinikMode();return;}
  if(S.page==='labor'){app.innerHTML=renderLab();}
  else if(S.page==='einverstaendnis'){app.innerHTML=renderEinverstaendnis();if(S.einvAdd)app.innerHTML+=renderEinvAdd();if(S.zugestimmtPopup!==null)app.innerHTML+=renderZugestimmtPopup();if(S.customPricePop)app.innerHTML+=renderCustomPricePopup();}
  else if(S.page==='archiv'){app.innerHTML=renderArchiv();}
  else if(S.page==='abrechnung'){app.innerHTML=renderAbrechnung();}
  else if(S.page==='zepreisliste'){app.innerHTML=renderZEPreisliste();}
  else if(S.page==='texteditor'){app.innerHTML=renderTexteditor();}
  else if(S.page==='pflegeheime'){app.innerHTML=renderPflegeheime();}
  else{
    app.innerHTML=renderHome();
    if(S.showAdd){app.innerHTML+=renderAdd();}
    if(S.reassignIdx!==null){app.innerHTML+=renderReassign();}
  }
  app.innerHTML+=renderMenu();
}

function getMyMessages(){if(!S.user)return[];var r=S.user.role,b=S.user.bId||null;return MESSAGES.filter(function(m){return m.to.indexOf(r)!==-1||(b&&m.to.indexOf(b)!==-1)}).sort(function(a,b){return b.time-a.time})}
function getUnreadCount(){return getMyMessages().filter(function(m){return!m.read}).length}
function fmtTimeAgo(t){var d=Math.floor((Date.now()-t)/60000);if(d<60)return d+" Min.";var h=Math.floor(d/60);if(h<24)return h+" Std.";var dd=Math.floor(h/24);return"vor "+dd+(dd===1?" Tag":" Tagen")}
function urg(e){if(!e)return"ok";var d=Math.ceil((e-Date.now())/D);return d<0?"expired":d<=30?"urgent":d<=60?"warning":"ok"}
function kHeimName(id){var h=KHEIME.find(function(x){return x.id===id});return h?h.name:""}
function kHeimAddr(id){var h=KHEIME.find(function(x){return x.id===id});if(!h)return'';var p=PFLEGEHEIME.find(function(x){return x.name===h.name});return p?p.strasse+', '+p.plz:(h.addr||'');}
function bhdlName(id){var b=BEHANDLER.find(function(x){return x.id===id});return b?b.name:""}
function badge(t,x){return'<span class="badge b-'+t+'">'+x+'</span>'}
function toothClass(s){if(!s)return"t-other";var p=s.split("+")[0];if(p==="f")return"t-other";if(p==="fu")return"t-f";if(p==="g"||p==="e"||p==="E")return"t-g";if(p==="c"||p==="C")return"t-g";if(p==="ex")return"t-ex";if(p==="kr"||p==="k"||p==="K"||p==="i"||p==="I")return"t-kr";if(p==="b"||p==="B")return"t-b";if(p==="t")return"t-kr";return"t-other"}
function getNextPaDate(pa){
  if(pa.step==="befund")return pa.befund?pa.befund.date+7*D:null;
  if(pa.step==="stoer"||pa.step==="vordruck"||pa.step==="atg"||pa.step==="mhu")return pa.befund?pa.befund.date+30*D:null;
  if(pa.step==="ait"){if(pa.ait&&pa.ait.sessions&&pa.ait.sessions.length)return pa.ait.sessions[pa.ait.sessions.length-1].date+14*D;return pa.mhu?pa.mhu.date+14*D:null}
  if(pa.step==="beva"){if(pa.ait&&pa.ait.sessions&&pa.ait.sessions.length)return pa.ait.sessions[pa.ait.sessions.length-1].date+180*D;return null}
  if(pa.step==="upt"){for(var i=0;i<pa.upts.length;i++){if(!pa.upts[i].done)return pa.upts[i].date}return null}
  return null;
}
function getPaStepStatus(pa,sid){var ci=PA_STEPS.findIndex(function(x){return x.id===pa.step});var si=PA_STEPS.findIndex(function(x){return x.id===sid});return si<ci?"done":si===ci?"current":"future"}
function getStepDate(pa,sid){
  if(sid==="befund"&&pa.befund)return pa.befund.date;if(sid==="stoer"&&pa.stoer)return pa.stoer.date;
  if(sid==="vordruck"&&pa.vordruck)return pa.vordruck.date;if(sid==="atg"&&pa.atg)return pa.atg.date;
  if(sid==="mhu"&&pa.mhu)return pa.mhu.date;if(sid==="ait"&&pa.ait&&pa.ait.sessions&&pa.ait.sessions.length)return pa.ait.sessions[pa.ait.sessions.length-1].date;
  if(sid==="beva"&&pa.beva)return pa.beva.date;if(sid==="upt"&&pa.upts&&pa.upts.length)return pa.upts[0].date;return null;
}
function getPresentTeeth(p){
  return FDI_SEQ.filter(function(n){
    if(n>=11&&n<=18){return p.odo.tl[18-n]!=="ex"}
    if(n>=21&&n<=28){return p.odo.tr[n-21]!=="ex"}
    if(n>=31&&n<=38){return p.odo.br[n-31]!=="ex"}
    if(n>=41&&n<=48){return p.odo.bl[48-n]!=="ex"}
    return false;
  });
}
function matchAiResponse(q){q=q.toLowerCase();if(q.includes("m\u00fcller")&&(q.includes("wo")||q.includes("wohn")))return AI_RESPONSES["wo wohnt m\u00fcller"];if(q.includes("m\u00fcller")&&(q.includes("hkp")||q.includes("status")))return AI_RESPONSES["hkp m\u00fcller"];if(q.includes("einwilligung")&&q.includes("kr\u00e4mer"))return AI_RESPONSES["einwilligung kr\u00e4mer"];if(q.includes("labor")&&q.includes("bauer"))return AI_RESPONSES["labor status bauer"];if(q.includes("kooperation")||q.includes("senterra"))return AI_RESPONSES["kooperationsvertrag senterra"];return AI_RESPONSES["default"]}

/* ===== ODONTOGRAM ===== */
function odoToothColor(x){if(!x)return"var(--t-fehlt)";var p=x.split("+")[0];if(p==="g")return"var(--t-healthy)";if(p==="e"||p==="E")return"var(--t-healthy)";if(p==="c"||p==="C")return"var(--t-caries)";if(p==="ex")return"var(--t-extract)";if(p==="kr"||p==="k"||p==="K")return"var(--t-crown)";if(p==="fu")return"var(--t-composite)";if(p==="f")return"var(--t-fehlt)";if(p==="b"||p==="B")return"var(--t-bridge)";if(p==="i"||p==="I")return"var(--t-crown)";if(p==="t")return"var(--t-teleskop)";if(p==="wr")return"var(--t-wurzelrest)";if(p==="z")return"var(--t-zerstoert)";if(p==="st")return"var(--t-stift)";if(p==="ph")return"var(--t-halte)";if(p==="rt")return"var(--t-retiniert)";return"var(--t-other)"}
function odoLabel(x){if(!x)return"";var p=x.split("+")[0];var map={g:"G",c:"C",ex:"Ex",kr:"Kr",f:"F",fu:"F\u00fc",b:"B",e:"E",i:"I",k:"Kr",K:"Kr",t:"T",wr:"Wr",z:"Z",st:"st",ph:"ph",rt:"rt"};return map[p]||p.substring(0,2).toUpperCase()}
function odoIsFehlt(x){if(!x)return true;return x.split("+")[0]==="f"}
function odoHasModifier(x){if(!x)return"";var parts=x.split("+");for(var j=1;j<parts.length;j++){if(parts[j]==="vp")return"+";if(parts[j]==="vn")return"\u2212";}return""}
function toothNrFromArr(arr,start,dir,i){return dir===1?start+i:start-i}
function renderOdo(o,patId){
  var pat=patId?PATIENTS.find(function(x){return x.id===patId}):null;
  var tab=S.odoTab||"status";
  function compactTooth(arr,start,dir,i){
    var x=arr[i];var n=toothNrFromArr(arr,start,dir,i);var bg=odoToothColor(x);var lbl=odoLabel(x);
    var isFehlt=odoIsFehlt(x);var mod=odoHasModifier(x);
    var hasTa=pat&&pat.txPlan&&pat.txPlan[n]&&pat.txPlan[n].indexOf("ta")!==-1;
    var style='background:'+bg;
    if(isFehlt)style+=';color:var(--text-4);border:1px dashed var(--border-2);box-shadow:none';
    if(hasTa&&tab==="status")style+=';outline:2px solid var(--amber);outline-offset:-1px';
    var html='<div class="ot" style="'+style+'" title="'+n+': '+(x||'fehlt')+'">';
    html+=lbl;
    if(mod)html+='<span class="mod-badge">'+mod+'</span>';
    html+='</div>';return html;
  }
  var h='<div class="odo-wrap">';
  h+='<div class="odo-header"><div class="odo-title">Odontogramm (FDI)</div><span style="font-size:10px;color:var(--blue);cursor:pointer;font-weight:600" onclick="S.odoRef=!S.odoRef;render()">'+(S.odoRef?"Katalog ausblenden":"Katalog")+'</span></div>';
  /* 3-Tab system */
  h+='<div class="odo-view-tabs">';
  ["status","behandlung","pa_blatt"].forEach(function(t){
    var label=t==="status"?"Status":t==="behandlung"?"Behandlung":"PA Blatt";
    h+='<button class="'+(tab===t?"active":"")+'" onclick="setOdoTab(\''+t+'\')">'+label+'</button>';
  });
  h+='</div>';

  if(tab==="status"){
    /* Number row upper */
    h+='<div class="odo-num-row">';
    for(var i=0;i<8;i++)h+='<div>'+(18-i)+'</div>';
    h+='<div class="odo-gap"></div>';
    for(var i=0;i<8;i++)h+='<div>'+(21+i)+'</div>';
    h+='</div>';
    /* Upper teeth: Q1(18-11) | Q2(21-28) */
    h+='<div class="odo-teeth-grid">';
    for(var i=0;i<8;i++)h+=compactTooth(o.tl,18,-1,i);
    h+='<div class="odo-gap"></div>';
    for(var i=0;i<8;i++)h+=compactTooth(o.tr,21,1,i);
    h+='</div>';
    /* Quadrant bars */
    h+='<div class="odo-qbar"><div class="odo-qbar-l">1</div><div></div><div class="odo-qbar-r">2</div></div>';
    h+='<div class="odo-qbar"><div class="odo-qbar-l">4</div><div></div><div class="odo-qbar-r">3</div></div>';
    /* Lower teeth: Q4(48-41) | Q3(31-38) */
    h+='<div class="odo-teeth-grid">';
    for(var i=0;i<8;i++)h+=compactTooth(o.bl,48,-1,i);
    h+='<div class="odo-gap"></div>';
    for(var i=0;i<8;i++)h+=compactTooth(o.br,31,1,i);
    h+='</div>';
    /* Number row lower */
    h+='<div class="odo-num-row">';
    for(var i=0;i<8;i++)h+='<div>'+(48-i)+'</div>';
    h+='<div class="odo-gap"></div>';
    for(var i=0;i<8;i++)h+='<div>'+(31+i)+'</div>';
    h+='</div>';
    /* Legend — expanded */
    h+='<div class="odo-legend"><span><span class="dot" style="background:var(--t-healthy)"></span>Gesund/Ersetzt</span><span><span class="dot" style="background:var(--t-caries)"></span>Kari\u00f6s</span><span><span class="dot" style="background:var(--t-extract)"></span>Extraktion</span><span><span class="dot" style="background:var(--t-crown)"></span>Krone/Impl.</span><span><span class="dot" style="background:var(--t-composite)"></span>F\u00fcllung</span><span><span class="dot" style="background:var(--t-bridge)"></span>Br\u00fccke</span><span><span class="dot" style="background:var(--t-teleskop)"></span>Teleskop</span><span><span class="dot" style="background:var(--t-stift)"></span>Stift</span><span><span class="dot" style="background:var(--t-fehlt);border:1px dashed var(--border-2)"></span>Fehlt</span></div>';
    /* Edit button */
    h+='<div style="text-align:center;margin-top:6px"><span style="font-size:10px;color:var(--blue);cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:4px" onclick="S.odoEdit=true;S.odoQ=1;S.odoSelTooth=0;render()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Status bearbeiten</span></div>';
    /* Odo history bar */
    if(pat&&pat.odoHist&&pat.odoHist.length>0){
      h+='<div class="odo-hist-bar"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><select onchange="restoreOdoHist('+patId+',this.value)"><option value="">Aktuell</option>';
      pat.odoHist.slice().sort(function(a,b){return b.date-a.date}).forEach(function(h2,idx){h+='<option value="'+idx+'">'+fmtDate(h2.date)+'</option>'});
      h+='</select><span style="font-size:9px;color:var(--text-4)">'+pat.odoHist.length+' Version'+(pat.odoHist.length>1?"en":"")+'</span></div>';
    }
  }

  if(tab==="behandlung"){
    h+=renderOdoBehandlung(o,pat);
  }

  if(tab==="pa_blatt"){
    h+=renderOdoPaBlatt(o,pat);
  }

  /* PA badge + Lab badges (always visible) */
  if(patId&&pat){
    if(pat.pa){var ps=PA_STEPS.find(function(x){return x.id===pat.pa.step});var nd=getNextPaDate(pat.pa);var du=nd?Math.ceil((nd-Date.now())/D):null;var uc=du===null?"ok":du<0?"overdue":du<=14?"due":"ok";h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div class="pa-odo-badge" style="background:var(--blue-50);color:var(--navy)" onclick="setPatTab(\'PA\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> PA: '+(ps?ps.label:"")+(du!==null?'<span class="pa-countdown '+uc+'">'+(du<0?Math.abs(du)+'d \u00fcberf\u00e4llig':du+'d')+'</span>':'')+'</div></div>'}
    var labItems=KLAB_ITEMS.filter(function(l){return l.patId===patId});if(labItems.length>0){h+='<div style="'+(pat.pa?'margin-top:8px':'margin-top:12px;padding-top:12px;border-top:1px solid var(--border)')+'"><div style="display:flex;flex-wrap:wrap;gap:6px">';labItems.forEach(function(li){h+='<span class="lab-patient-badge" onclick="kShowLabDetail('+li.id+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M9 3h6v5.586a1 1 0 0 0 .293.707l4.414 4.414A2 2 0 0 1 21 15.121V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3.879a2 2 0 0 1 .586-1.414L8 9.293A1 1 0 0 0 9 8.586V3z"/></svg> '+li.prothType+' ('+li.jaw+'): <span style="font-weight:700;color:'+LAB_COLORS[li.stage]+'">'+LAB_STAGES[li.stage]+'</span>'+(li.vita?' \u2014 VITA '+li.vita:'')+'</span>'});h+='</div></div>'}
  }
  if(S.odoRef){h+='<div style="margin-top:12px;padding:12px;background:var(--surface);border-radius:var(--r-md);border:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Zahnstatus-Katalog (16 Codes)</div><div style="font-size:10px;color:var(--text-3);line-height:1.7"><strong>Status:</strong> E=ersetzt, Ex=Extraktion, F=fehlend, F\u00fc=F\u00fcllung, G=gesund, C=kari\u00f6s, Kr=Krone, B=Br\u00fccke, I=Implantat, T=Teleskop, Wr=Wurzelrest, Z=zerst\u00f6rt, st=Stift, ph=Halteelement, rt=retiniert<br><strong>Modifikatoren:</strong> (+)=Vitalit\u00e4t positiv, (\u2212)=Vitalit\u00e4t negativ<br><strong>Kombiniert:</strong> C+Kr=kari\u00f6se Krone, st+Kr=Stift+Krone, T+E=Teleskop unter Prothese</div></div>'}
  h+='</div>';return h;
}

/* ===== ODONTOGRAM BEHANDLUNG TAB ===== */
function renderOdoBehandlung(o,pat){
  var txp=pat?pat.txPlan||{}:{};
  var sel=S.txSelTooth;
  function txToothCell(arr,start,dir,i){
    var x=arr[i];var n=toothNrFromArr(arr,start,dir,i);var bg=odoToothColor(x);
    var isFehlt=odoIsFehlt(x);var codes=txp[n]||[];
    var isSel=sel===n;
    var style='background:'+bg;if(isFehlt)style+=';color:var(--text-4);border:1px dashed var(--border-2);box-shadow:none';
    var h2='<div class="tx-tooth-cell'+(isSel?" sel":"")+'" onclick="S.txSelTooth='+n+';render()">';
    h2+='<div class="tn">'+n+'</div>';
    h2+='<div class="tb" style="'+style+'">'+odoLabel(x)+'</div>';
    if(codes.length>0)h2+='<div class="tc">'+codes.join(",")+'</div>';
    h2+='</div>';return h2;
  }
  var h='';
  /* Upper jaw */
  h+='<div class="tx-tooth-row">';
  for(var i=0;i<8;i++)h+=txToothCell(o.tl,18,-1,i);
  h+='<div style="width:4px"></div>';
  for(var i=0;i<8;i++)h+=txToothCell(o.tr,21,1,i);
  h+='</div>';
  h+='<div class="odo-qbar" style="margin:2px 0"><div class="odo-qbar-l" style="height:14px;font-size:8px">1</div><div></div><div class="odo-qbar-r" style="height:14px;font-size:8px">2</div></div>';
  h+='<div class="odo-qbar" style="margin:2px 0"><div class="odo-qbar-l" style="height:14px;font-size:8px">4</div><div></div><div class="odo-qbar-r" style="height:14px;font-size:8px">3</div></div>';
  /* Lower jaw */
  h+='<div class="tx-tooth-row">';
  for(var i=0;i<8;i++)h+=txToothCell(o.bl,48,-1,i);
  h+='<div style="width:4px"></div>';
  for(var i=0;i<8;i++)h+=txToothCell(o.br,31,1,i);
  h+='</div>';

  /* Selected tooth info */
  if(sel!==null){
    var codes=txp[sel]||[];
    h+='<div style="margin-top:10px;padding:10px;background:var(--blue-50);border-radius:var(--r-md);border:1px solid var(--blue)">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px">Zahn '+sel+(codes.length>0?' \u2014 '+codes.length+' Behandlung'+(codes.length>1?'en':''):'')+'</div>';
    if(codes.length>0){h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';codes.forEach(function(c,ci){h+='<span style="padding:3px 8px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-full);font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px;color:var(--text-2)">'+(c==="ta"?"<span style=\"color:var(--amber)\">"+c.toUpperCase()+"</span>":c.toUpperCase())+' <span style="cursor:pointer;color:var(--crimson);font-size:12px" onclick="removeTx('+sel+','+ci+')">\u00d7</span></span>'});h+='</div>'}
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap">';
    h+='<button style="padding:4px 10px;background:var(--emerald);color:#fff;border:none;border-radius:var(--r-full);font-size:9px;font-weight:700;cursor:pointer;font-family:inherit" onclick="completeTxTooth('+sel+')">Erledigt \u2713</button>';
    h+='</div></div>';
  }else{
    h+='<div style="margin-top:10px;text-align:center;font-size:10px;color:var(--text-3)">Zahn ausw\u00e4hlen, um Behandlung zuzuweisen</div>';
  }

  /* Treatment keypad */
  h+='<div class="tx-keys">';
  TX_CODES.forEach(function(tc){
    h+='<button class="'+(tc.code==="ta"?"ta-key":"")+'" onclick="addTx('+sel+',\''+tc.code+'\')"'+(sel===null?' disabled style="opacity:0.4"':'')+'>';
    h+='<span class="k-main">'+tc.short+'</span><span class="k-sub">'+tc.label+'</span></button>';
  });
  h+='</div>';
  return h;
}

/* ===== ODONTOGRAM PA BLATT TAB ===== */
function renderOdoPaBlatt(o,pat){

/* ===== BEHANDLER SCREENS ===== */
function kNearestRoute(ids){
  if(ids.length<=1)return ids.slice();
  var rem=ids.slice(),route=[rem.splice(0,1)[0]];
  while(rem.length){
    var last=route[route.length-1];
    var best=rem.reduce(function(a,b){
      var ta=KHEIM_T[last]?KHEIM_T[last][a]:null,tb=KHEIM_T[last]?KHEIM_T[last][b]:null;
      return(typeof ta==='number'&&(typeof tb!=='number'||ta<=tb))?a:b;
    });
    route.push(rem.splice(rem.indexOf(best),1)[0]);
  }
  return route;
}
function renderKRoute(heimIds){
  if(!heimIds||heimIds.length===0)return'';
  var ordered=kNearestRoute(heimIds);
  var totalMin=0;
  for(var i=0;i<ordered.length-1;i++){var m=KHEIM_T[ordered[i]]&&KHEIM_T[ordered[i]][ordered[i+1]];if(typeof m==='number')totalMin+=m;}
  var h='<div class="route-box"><div class="route-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>Empfohlene Route'+(totalMin>0?'<span class="route-total">~'+totalMin+' Min.</span>':'')+'</div><div class="route-stops">';
  ordered.forEach(function(id,i){
    var hm=KHEIME.find(function(x){return x.id===id});if(!hm)return;
    var nextMin=i<ordered.length-1&&KHEIM_T[id]?KHEIM_T[id][ordered[i+1]]:null;
    h+='<div class="route-stop"><div class="route-stop-left"><div class="route-dot"></div>'+(i<ordered.length-1?'<div class="route-line"></div>':'')+'</div><div class="route-stop-body"><div class="route-stop-name">'+hm.name+'</div><div class="route-stop-addr">'+kHeimAddr(id)+'</div>'+(typeof nextMin==='number'?'<div class="route-stop-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> '+nextMin+' Min. weiter</div>':'')+'</div></div>';
  });
  h+='</div></div>';
  return h;
}

function renderSondierungGrid(spiegel,bop,odo){
  function getTeeth(arr,start,dir){var t=[];for(var i=0;i<8;i++){var n=dir===1?start+i:start-i;var pr=arr[i]!=="ex";var m=spiegel&&spiegel[n]?spiegel[n][0]:null;var d=spiegel&&spiegel[n]?spiegel[n][1]:null;var b=bop&&bop[n]?true:false;t.push({n:n,p:pr,m:m,d:d,b:b})}return t}
  function jawHtml(teeth){
    var h='<div class="pa-grid" style="grid-template-columns:32px repeat('+teeth.length+',1fr)">';
    h+='<div class="pa-gc hdr"></div>';teeth.forEach(function(t){h+='<div class="pa-gc hdr">'+(t.p?t.n:"")+'</div>'});
    h+='<div class="pa-gc lbl">M</div>';teeth.forEach(function(t){h+='<div class="pa-gc'+(t.p&&t.m!==null?(t.m>=5?" dp":t.m>=4?" md":""):" ext")+'">'+(t.p&&t.m!==null?t.m:"")+'</div>'});
    h+='<div class="pa-gc lbl">D</div>';teeth.forEach(function(t){h+='<div class="pa-gc'+(t.p&&t.d!==null?(t.d>=5?" dp":t.d>=4?" md":""):" ext")+'">'+(t.p&&t.d!==null?t.d:"")+'</div>'});
    h+='<div class="pa-gc lbl">BOP</div>';teeth.forEach(function(t){h+='<div class="pa-gc'+(t.b?" bop-y":"")+'">'+(t.b?"\u2022":"")+'</div>'});
    h+='</div>';return h}
  var upper=getTeeth(odo.tl,18,-1).concat(getTeeth(odo.tr,21,1));
  var lower=getTeeth(odo.bl,48,-1).concat(getTeeth(odo.br,31,1));
  var h='<div class="pa-grid-wrap">';
  h+='<div style="font-size:8px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Oberkiefer</div>';
  h+=jawHtml(upper);
  h+='<div style="font-size:8px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin:6px 0 2px">Unterkiefer</div>';
  h+=jawHtml(lower);
  h+='</div>';return h}

function getQTeeth(q){if(q===1)return[18,17,16,15,14,13,12,11];if(q===2)return[21,22,23,24,25,26,27,28];if(q===3)return[48,47,46,45,44,43,42,41];return[31,32,33,34,35,36,37,38]}
function getQArr(o,q){if(q===1)return o.tl;if(q===2)return o.tr;if(q===3)return o.bl;return o.br}
function renderOdoEditor(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return"";
  var q=S.odoQ||1;var teeth=getQTeeth(q);var arr=getQArr(p.odo,q);var si=S.odoSelTooth||0;
  var curVal=arr[si]||"";
  var h='<div class="f174-overlay" style="z-index:97"><div style="padding:16px 20px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:16px;font-weight:700">Zahnstatus bearbeiten</div><button style="border:none;background:rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:var(--r-full);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit" onclick="odoSaveAndClose()">Fertig</button></div></div>';

  /* Q tabs */
  h+='<div class="odo-qtabs">';
  [1,2,3,4].forEach(function(n){h+='<button class="'+(q===n?"active":"")+'" onclick="S.odoQ='+n+';S.odoSelTooth=0;render()">Q'+n+'</button>'});

  h+='<div style="text-align:center;margin-bottom:6px"><div style="display:flex;justify-content:center;gap:3px">';
  teeth.forEach(function(t,i){h+='<div style="font-size:8px;font-weight:600;color:var(--text-4);width:36px;text-align:center">'+t+'</div>'});
  h+='</div><div class="odo-teeth-row">';
  teeth.forEach(function(t,i){var x=arr[i];var bg=odoToothColor(x);var lbl=odoLabel(x);var isFehlt=odoIsFehlt(x);
    var style='background:'+bg;if(isFehlt)style+=';color:var(--text-4);border:1px dashed var(--border-2);box-shadow:none';
    h+='<div class="ot-big'+(si===i?" sel":"")+'" style="'+style+'" onclick="S.odoSelTooth='+i+';render()">'+lbl+'</div>'});
  h+='</div></div>';
  /* Current status display */
  h+='<div style="text-align:center;margin:6px 0;font-size:10px;color:var(--text-3)">Zahn '+teeth[si]+': <strong style="color:var(--text)">'+(curVal||"Leer")+'</strong></div>';
  /* Status keypad — 16 codes in 4 columns */
  h+='<div class="odo-keys">';
  ODO_STATUS_CODES.forEach(function(k){
    var isModifier=k.code==="(+)"||k.code==="(\u2212)";
    var btnStyle=isModifier?'border-color:var(--violet);background:var(--violet-bg)':'';
    h+='<button style="'+btnStyle+'" onclick="setOdoStatus(\''+k.code.replace("'","\\'")+'\')"><span class="k-main"'+(isModifier?' style="color:var(--violet)"':'')+'>'+k.code+'</span><span class="k-sub">'+k.label+'</span></button>';
  });
  /* Clear button */
  h+='<button style="border-color:var(--crimson);background:var(--crimson-bg)" onclick="clearOdoStatus()"><span class="k-main" style="color:var(--crimson)">\u00d7</span><span class="k-sub">L\u00f6schen</span></button>';
  h+='</div>';
  h+='</div>';
  h+='<div style="padding:16px 20px;border-top:1px solid var(--border)"><button style="width:100%;padding:14px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:var(--r-md);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:var(--sh-blue)" onclick="odoSaveAndClose()">Speichern</button></div></div>';
  return h;
}
function setOdoStatus(code){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  var map={"E":"e","Ex":"ex","F":"f","F\u00fc":"fu","G":"g","C":"c","Kr":"kr","B":"b","I":"i","T":"t","Wr":"wr","Z":"z","st":"st","ph":"ph","rt":"rt"};
  var arr=getQArr(p.odo,S.odoQ||1);var idx=S.odoSelTooth||0;
  /* Modifiers (+)/(-) append to current value */
  if(code==="(+)"||code==="(\u2212)"){
    var cur=arr[idx]||"";var modCode=code==="(+)"?"vp":"vn";
    /* Remove existing vitality modifier first */
    cur=cur.replace(/\+v[pn]/g,"");
    if(cur)arr[idx]=cur+"+"+modCode;
    render();return;
  }
  var val=map[code]||code.toLowerCase();
  arr[idx]=val;
  /* Auto-advance */
  if(idx<7)S.odoSelTooth=idx+1;
  render();
}
function clearOdoStatus(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  var arr=getQArr(p.odo,S.odoQ||1);arr[S.odoSelTooth||0]=null;render();
}
function odoSaveAndClose(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});
  if(p)odoAutoSave(p);
  S.odoEdit=false;render();
}
function odoAutoSave(p){
  if(!p)return;
  var today=new Date();today.setHours(0,0,0,0);var todayMs=today.getTime();
  var snap=JSON.parse(JSON.stringify(p.odo));
  /* Check if we already have a save for today */
  var found=false;
  for(var i=0;i<p.odoHist.length;i++){
    var hd=new Date(p.odoHist[i].date);hd.setHours(0,0,0,0);
    if(hd.getTime()===todayMs){p.odoHist[i].odo=snap;found=true;break;}
  }
  if(!found)p.odoHist.push({date:Date.now(),odo:snap});
}
function restoreOdoHist(patId,idx){
  var p=PATIENTS.find(function(x){return x.id===patId});if(!p)return;
  if(idx===""||idx===null){render();return;}
  var sorted=p.odoHist.slice().sort(function(a,b){return b.date-a.date});
  var entry=sorted[parseInt(idx)];
  if(entry){p.odo=JSON.parse(JSON.stringify(entry.odo))}
  render();
}

function addTx(toothNr,code){
  if(toothNr===null)return;
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  if(!p.txPlan)p.txPlan={};if(!p.txPlan[toothNr])p.txPlan[toothNr]=[];
  if(p.txPlan[toothNr].indexOf(code)===-1)p.txPlan[toothNr].push(code);
  render();

function removeTx(toothNr,idx){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.txPlan||!p.txPlan[toothNr])return;
  p.txPlan[toothNr].splice(idx,1);
  if(p.txPlan[toothNr].length===0)delete p.txPlan[toothNr];
  render();
}
function completeTxTooth(toothNr){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.txPlan||!p.txPlan[toothNr])return;
  var codes=p.txPlan[toothNr].slice();
  /* Add visit documentation */
  if(!p.visits)p.visits=[];
  p.visits.unshift({date:Date.now(),behandler:S.user?S.user.bId||"hFeld":"hFeld",codes:codes,text:"Behandlung Zahn "+toothNr+": "+codes.map(function(c){return c.toUpperCase()}).join(", ")+" durchgef\u00fchrt.",voice:false});
  /* Auto-update tooth status based on treatment */
  codes.forEach(function(c){
    var statusMap={"ex":"ex","fu":"fu","e":"e","st":"st","ph":"ph","ekr":"g","ta":"g"};
    if(statusMap[c]){
      if(toothNr>=11&&toothNr<=18)p.odo.tl[18-toothNr]=statusMap[c];
      else if(toothNr>=21&&toothNr<=28)p.odo.tr[toothNr-21]=statusMap[c];
      else if(toothNr>=31&&toothNr<=38)p.odo.br[toothNr-31]=statusMap[c];
      else if(toothNr>=41&&toothNr<=48)p.odo.bl[48-toothNr]=statusMap[c];
    }
  });
  /* Remove completed treatments */
  delete p.txPlan[toothNr];
  /* Auto-save odontogram */
  odoAutoSave(p);
  S.txSelTooth=null;
  render();
}

function createZeCase(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  p.ze={st:0,type:"Befund",zs:0,exp:null,bh:S.user&&S.user.bId?S.user.bId:"hFeld",comments:[],planned:{}};
  render();
}
function zeAdvance(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze)return;
  var oldSt=p.ze.st;
  if(p.ze.st<ZE_STATES.length-1){
    p.ze.st++;
    /* Abdruck (stage 6) → auto-create Lab item */
    if(p.ze.st===6){
      var nid=KLAB_ITEMS.reduce(function(m,x){return Math.max(m,x.id)},0)+1;
      KLAB_ITEMS.push({id:nid,patId:p.id,patName:p.name,type:p.ze.type,prothType:"Totalprothese",jaw:"OK",heim:p.heim,bh:p.ze.bh,stage:0,tech:LAB_TECHS[0],vita:null,teeth:[],note:"Auto-erstellt bei Abdruck",created:Date.now(),completed:null,phase:"test"});
      MESSAGES.unshift({id:MESSAGES.length+100,type:"nudge",from:"System",to:["labor"],title:"Neuer Laborauftrag: "+p.name,body:"Abdruck genommen f\u00fcr "+p.ze.type+". Laborauftrag automatisch erstellt.",patId:p.id,tag:"lab",time:Date.now(),read:false});
    }
    /* HKP bewilligt (stage 5) → set expiry 6 months */
    if(p.ze.st===5&&!p.ze.exp){p.ze.exp=Date.now()+180*D}
    /* Zustimmung requested (stage 1) → notify Verwaltung */
    if(p.ze.st===1){
      MESSAGES.unshift({id:MESSAGES.length+100,type:"nudge",from:"System",to:["verwaltung","ceo"],title:"Zustimmung angefragt: "+p.name,body:"Behandlungsplan erstellt f\u00fcr "+p.ze.type+". Bitte an Betreuer zur Unterschrift senden.",patId:p.id,tag:"hkp",time:Date.now(),read:false});
    }
    /* Fertig (stage 10) → archive */
    if(p.ze.st===10){
      if(!p.zeArchive)p.zeArchive=[];
      p.zeArchive.push({type:p.ze.type,zs:p.ze.zs,bh:p.ze.bh,completed:Date.now(),comments:p.ze.comments?p.ze.comments.slice():[]});
    }
  }
  render();
}
function zeRevert(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze||p.ze.st<=0)return;
  p.ze.st--;render();
}
function zeAddComment(){
  var ta=document.getElementById("zeComment");if(!ta||!ta.value.trim())return;
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze)return;
  if(!p.ze.comments)p.ze.comments=[];
  p.ze.comments.push({date:Date.now(),text:ta.value.trim(),stage:p.ze.st,by:S.user?S.user.name:"System"});
  ta.value="";render();
}
function zeSetPlanned(tooth,val){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze)return;
  if(!p.ze.planned)p.ze.planned={};
  p.ze.planned[tooth]=val;render();
}

/* ===== PA CREATION ===== */
function createPaCase(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  p.pa={step:"befund",comment:"",befund:null,stoer:null,vordruck:null,anzeige:null,einwilligung:null,atg:null,mhu:null,ait:null,beva:null,upts:[{nr:1,date:Date.now()+90*D,done:false,type:"e"},{nr:2,date:Date.now()+180*D,done:false,type:"e"},{nr:3,date:Date.now()+270*D,done:false,type:"e"},{nr:4,date:Date.now()+360*D,done:false,type:"f"}],recalls:[],behandler:S.user&&S.user.bId?S.user.bId:"hFeld"};
  render();
}

/* ===== PATIENT EDIT ===== */
function togglePatEdit(){S.patEditMode=!S.patEditMode;render()}
function savePatEdit(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  var nm=document.getElementById("peNach"),vr=document.getElementById("peVor"),rm=document.getElementById("peRoom"),ag=document.getElementById("peAge"),ins=document.getElementById("peIns"),inr=document.getElementById("peInsNr");
  if(nm&&vr)p.name=nm.value.trim()+", "+vr.value.trim();
  if(rm)p.room=rm.value.trim();
  if(ag)p.age=parseInt(ag.value)||p.age;
  if(ins)p.ins=ins.value.trim();
  if(inr)p.insNr=inr.value.trim();
  S.patEditMode=false;render();
}

/* ===== SCHEDULE EDIT ===== */
function scheduleEdit(bId,dayIdx){S.scheduleEdit={bId:bId,day:dayIdx};render()}
function scheduleSave(bId,dayIdx){
  var sel=document.getElementById("schedSel");if(!sel)return;
  SCHEDULE[bId][dayIdx]=sel.value;
  S.scheduleEdit=null;render();
}
function scheduleCancel(){S.scheduleEdit=null;render()}

/* ===== KLINIK RENDER ===== */

function renderKlinikMode(){
  var app=document.getElementById("app"),html="";
  if(S.kScreen==="login"){app.innerHTML=renderLogin();return}
  if(S.kScreen==="manager")html=renderManager();
  else if(S.kScreen==="lab")html=renderKLab();
  else if(S.kScreen==="messages")html=renderMessages();
  else if(S.kScreen==="home")html=renderKHome();
  else if(S.kScreen==="heim")html=renderHeim();
  else if(S.kScreen==="patient")html=renderPatient();
  else if(S.kScreen==="pipeline")html=renderPipeline();
  else if(S.kScreen==="search")html=renderSearch();

  var role=S.user?S.user.role:"",s=S.kScreen,uc=getUnreadCount();
  var msgNav=navBtn('<span class="nav-badge">'+ICO.msg+(uc?'<span class="nav-badge-count">'+uc+'</span>':'')+'</span>','Nachr.','goMessages()',s==="messages");

  if(role==="laborant"){html+='<div class="bottom-nav">'+navBtn(ICO.lab,"Labor","goLab()",s==="lab")+msgNav+navBtn(ICO.search,"Suche","goSearch()",s==="search")+'</div>'}
  else if(s==="manager"||((role==="ceo"||role==="verwaltung")&&s==="messages")){html+='<div class="bottom-nav">'+navBtn(ICO.chart,"Dashboard","S.kScreen=\'manager\';S.mgrTab=\'\u00dcbersicht\';render()",s==="manager")+navBtn(ICO.lab,"Labor","goLab()",false)+msgNav+navBtn(ICO.home,"Praxis","S.kScreen=\'home\';render()",false)+navBtn(ICO.search,"Suche","goSearch()",s==="search")+'</div>'}
  else{html+='<div class="bottom-nav">'+navBtn(ICO.home,"Heute","goHome()",s==="home")+navBtn(ICO.pipeline,"Pipeline","goPipeline()",s==="pipeline")+msgNav+'<button class="nav-btn" onclick="toggleAdd()"><span class="fab-add">+</span></button>'+navBtn(ICO.search,"Suche","goSearch()",s==="search")+'</div>';if(s==="patient"){html+='<button class="fab-mic" onclick="insertDictation()">'+ICO.mic+'</button>'}html+='<button class="ai-fab" onclick="toggleAi()">KI</button>'}

  if(S.showAdd){html+='<div class="overlay" onclick="toggleAdd()"><div class="add-panel" onclick="event.stopPropagation()"><div style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)">Neu hinzuf\u00fcgen</div><button style="background:var(--blue-50);color:var(--navy)" onclick="toggleAdd();S.showNewPatient=true;S.newPatData={pflegegrad:\'3\'};render()">'+ICO.user+' Neuer Patient</button><button style="background:var(--surface-2);color:var(--text-3)" onclick="toggleAdd()">Abbrechen</button></div></div>'}
  if(S.dictOn){html+='<div class="dict-panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:15px;font-weight:700;color:var(--text)">KI-Diktat</div><button style="border:none;background:none;cursor:pointer;color:var(--text-3);display:flex;padding:4px" onclick="S.dictOn=false;render()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="dict-bar" style="animation:pulse 1.5s infinite">'+ICO.mic+' Aufnahme aktiv\u2026</div><textarea placeholder="Transkription erscheint hier\u2026"></textarea><button class="submit" onclick="saveDictation()">In Behandlungsverlauf einf\u00fcgen</button></div>'}
  html+='<div style="position:absolute;top:14px;right:14px;z-index:302"><button class="menu-btn" onclick="toggleKMenu()">&#9776;</button></div>';
  html+=renderKMenu();
if(S.labCreate)html+=renderKLabCreate();
  if(S.labDetail&&!S.labCreate)html+=renderKLabDetail();
  if(S.msgDetail)html+=renderMsgDetail();
  if(S.msgCompose)html+=renderMsgCompose();
  if(S.aiChat)html+=renderAiChat();
  if(S.paOverlay==="befund_entry")html+=renderPaEntry();
  if(S.odoEdit)html+=renderOdoEditor();
  if(S.f174)html+=renderF174Wizard();
  if(S.showNewPatient)html+=renderNewPatientForm();
  if(S.showNewHeim)html+=renderNewHeimForm();
  if(S.showLogoutConfirm)html+=renderLogoutConfirm();
  app.innerHTML=html;
}
function switchToAdmin(){S.mode='admin';S.page='uebersicht';S.showMenu=false;S.kMenu=false;render();}
function switchToKlinik(){S.mode='klinik';S.kScreen='home';S.showMenu=false;S.kMenu=false;render();}
function toggleKMenu(){S.kMenu=!S.kMenu;render();}
function closeKMenu(){S.kMenu=false;render();}
function renderKMenu(){
  if(!S.kMenu)return'';
  var role=S.user?S.user.role:'';
  var adminBtn=(role==='superadmin'||role==='ceo')
    ?'<button class="menu-item" onclick="closeKMenu();switchToAdmin()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Administration</button>'
    :'';
  var dashBtn=(role==='superadmin'||role==='ceo'||role==='verwaltung')&&S.kScreen!=='manager'
    ?'<button class="menu-item" onclick="closeKMenu();S.kScreen=\'manager\';S.mgrTab=\'\u00dcbersicht\';render()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Dashboard</button>'
    :'';
  return '<div class="menu-backdrop" onclick="closeKMenu()"></div>'
    +'<div class="menu-dropdown">'
      +dashBtn
      +adminBtn
      +'<button class="menu-item menu-divider" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Abmelden</button>'
    +'</div>';
}

render();
