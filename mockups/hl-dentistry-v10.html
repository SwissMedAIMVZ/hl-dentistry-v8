.route-stop-name{font-size:12px;font-weight:700;color:var(--navy)}
.route-stop-addr{font-size:10px;color:var(--text-3);margin-top:1px}
.route-stop-time{font-size:10px;color:var(--text-3);margin-top:4px;display:flex;align-items:center;gap:3px;font-weight:500}
/* EINVERSTÄNDNIS */
.einv-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.einv-tab{flex:1;padding:11px 8px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--text-3);font-family:inherit;position:relative;transition:color .2s var(--ease);letter-spacing:0.3px}
.einv-tab.active{color:var(--navy)}
.einv-tab.active::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2.5px;background:linear-gradient(90deg,var(--navy),var(--blue));border-radius:2px}
.einv-badge{position:absolute;top:5px;right:18%;background:var(--crimson);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:var(--r-full);min-width:14px;text-align:center}
.einv-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh-card)}
.einv-card-name{font-size:14px;font-weight:700;color:var(--text)}
.einv-card-sub{font-size:11px;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:4px}
.einv-card-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.einv-betreuer{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px}
.einv-action{display:flex;gap:6px;margin-top:10px}
.einv-btn{flex:1;padding:8px;border:none;border-radius:var(--r-md);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s var(--ease)}
.einv-btn-primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff}
.einv-btn-secondary{background:var(--surface-2);color:var(--text-3)}
/* ARCHIV */
.archiv-search-bar{padding:8px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.archiv-search-input{width:100%;padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:12px;font-family:inherit;background:var(--surface);outline:none;color:var(--text)}
.archiv-search-input:focus{border-color:var(--blue);background:#fff}
.archiv-year-tabs{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0}
.archiv-year-tabs::-webkit-scrollbar{display:none}
.archiv-year-btn{padding:5px 13px;border-radius:var(--r-full);border:1.5px solid var(--border);background:var(--surface-2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text-2);white-space:nowrap;flex-shrink:0}
.archiv-year-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.archiv-month-tabs{display:flex;gap:4px;padding:6px 14px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.archiv-month-tabs::-webkit-scrollbar{display:none}
.archiv-month-btn{padding:4px 10px;border-radius:var(--r-full);border:1px solid var(--border);background:var(--white);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text-3);white-space:nowrap;flex-shrink:0}
.archiv-month-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.archiv-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh-card)}
.archiv-card-name{font-size:14px;font-weight:700;color:var(--text)}
.archiv-card-sub{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px;margin-top:3px}
.archiv-card-dates{font-size:11px;color:var(--text-2);margin-top:8px;display:flex;flex-direction:column;gap:3px}
/* DATE FIELDS */
.date-field{margin-top:6px}
.date-field label{font-size:10px;font-weight:700;color:var(--text-3);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px}
.date-field input[type=date]{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.date-field input[type=date]:focus{border-color:var(--blue);background:#fff}
/* ADMIN HEADER INNER */
.header-inner{display:flex;justify-content:space-between;align-items:start;position:relative;z-index:1}

function getStepDate(pa,sid){

  if(sid==="vordruck"&&pa.vordruck)return pa.vordruck.date;if(sid==="atg"&&pa.atg)return pa.atg.date;
  if(sid==="mhu"&&pa.mhu)return pa.mhu.date;if(sid==="ait"&&pa.ait&&pa.ait.sessions&&pa.ait.sessions.length)return pa.ait.sessions[pa.ait.sessions.length-1].date;
  if(sid==="beva"&&pa.beva)return pa.beva.date;if(sid==="upt"&&pa.upts&&pa.upts.length)return pa.upts[0].date;return null;
}
function getPresentTeeth(p){
  return FDI_SEQ.filter(function(n){
    if(n>=11&&n<=18){return p.odo.tl[18-n]!=="ex"}
    if(n>=21&&n<=28){return p.odo.tr[n-21]!=="ex"}
    if(n>=31&&n<=38){return p.odo.br[n-31]!=="ex"}
    if(n>=41&&n<=48){return p.odo.bl[48-n]!=="ex"}
    return false;
  });
}
function isToothPresent(p,n){
  if(n>=11&&n<=18)return p.odo.tl[18-n]!=="ex";
  if(n>=21&&n<=28)return p.odo.tr[n-21]!=="ex";
  if(n>=31&&n<=38)return p.odo.br[n-31]!=="ex";
  if(n>=41&&n<=48)return p.odo.bl[48-n]!=="ex";
  return false;
}

function matchAiResponse(q){q=q.toLowerCase();if(q.includes("m\u00fcller")&&(q.includes("wo")||q.includes("wohn")))return AI_RESPONSES["wo wohnt m\u00fcller"];if(q.includes("m\u00fcller")&&(q.includes("hkp")||q.includes("status")))return AI_RESPONSES["hkp m\u00fcller"];if(q.includes("einwilligung")&&q.includes("kr\u00e4mer"))return AI_RESPONSES["einwilligung kr\u00e4mer"];if(q.includes("labor")&&q.includes("bauer"))return AI_RESPONSES["labor status bauer"];if(q.includes("kooperation")||q.includes("senterra"))return AI_RESPONSES["kooperationsvertrag senterra"];return AI_RESPONSES["default"]}

function odoToothColor(x){if(!x)return"var(--t-fehlt)";var p=x.split("+")[0];if(p==="g")return"var(--t-healthy)";if(p==="e"||p==="E")return"var(--t-healthy)";if(p==="c"||p==="C")return"var(--t-caries)";if(p==="ex")return"var(--t-extract)";if(p==="kr"||p==="k"||p==="K")return"var(--t-crown)";if(p==="fu")return"var(--t-composite)";if(p==="f")return"var(--t-fehlt)";if(p==="b"||p==="B")return"var(--t-bridge)";if(p==="i"||p==="I")return"var(--t-crown)";if(p==="t")return"var(--t-teleskop)";if(p==="wr")return"var(--t-wurzelrest)";if(p==="z")return"var(--t-zerstoert)";if(p==="st")return"var(--t-stift)";if(p==="ph")return"var(--t-halte)";if(p==="rt")return"var(--t-retiniert)";return"var(--t-other)"}
function odoLabel(x){if(!x)return"";var p=x.split("+")[0];var map={g:"G",c:"C",ex:"Ex",kr:"Kr",f:"F",fu:"F\u00fc",b:"B",e:"E",i:"I",k:"Kr",K:"Kr",t:"T",wr:"Wr",z:"Z",st:"st",ph:"ph",rt:"rt"};return map[p]||p.substring(0,2).toUpperCase()}
function odoIsFehlt(x){if(!x)return true;return x.split("+")[0]==="f"}
function odoHasModifier(x){if(!x)return"";var parts=x.split("+");for(var j=1;j<parts.length;j++){if(parts[j]==="vp")return"+";if(parts[j]==="vn")return"\u2212";}return""}
function toothNrFromArr(arr,start,dir,i){return dir===1?start+i:start-i}

function getTodayTasks(){
  var tasks=[];
  PATIENTS.forEach(function(p){
    if(p.ze){var u=urg(p.ze.exp);if(u==="expired")tasks.push({patId:p.id,pat:p.name,heim:heimName(p.heim),type:"urgent",label:"HKP abgelaufen",sub:ZE_STATES[p.ze.st],done:false});else if(u==="urgent")tasks.push({patId:p.id,pat:p.name,heim:heimName(p.heim),type:"warning",label:"HKP-Frist <30d",sub:ZE_STATES[p.ze.st],done:false})}
    if(p.pa){var nd=getNextPaDate(p.pa);if(nd){var dd=Math.ceil((nd-Date.now())/D);if(dd<=7){var ps=PA_STEPS.find(function(x){return x.id===p.pa.step});tasks.push({patId:p.id,pat:p.name,heim:heimName(p.heim),type:dd<0?"urgent":"active",label:"PA: "+(ps?ps.label:""),sub:dd<0?Math.abs(dd)+"d \u00fcberf\u00e4llig":"in "+dd+"d",done:false})}}}
    if(p.tx.length>0)p.tx.forEach(function(t){tasks.push({patId:p.id,pat:p.name,heim:heimName(p.heim),type:"treat",label:t.toUpperCase(),sub:"Offene Aufgabe",done:false})});
  });
  return tasks;
}

function erledigtBehandlung(){
  var m=S.behandelnModal;if(!m)return;
  var f=S.behandelnForm||{};
  var ta=document.getElementById('bhDictText');
  var mta=document.getElementById('bhManualText');
  var wb=document.getElementById('bhWeiterBeh');
  var wd=document.getElementById('bhWeiterDate');
  var wbh=document.getElementById('bhWeiterBhId');
  var dict=ta?ta.value.trim():(f.notes||'');

  var wDate=wd?wd.value:(f.weiterDate||'');
  var wBhId=wbh?wbh.value:(f.weiterBhId||'');

  var combined=dict;
  if(manual)combined+=(combined?'\n\nManuelle Erg\u00e4nzung: ':'Manuelle Erg\u00e4nzung: ')+manual;
  var p=PATIENTS.find(function(x){return x.id===m.patId});
  if(p&&combined){
    if(!p.visits)p.visits=[];
    p.visits.unshift({date:Date.now(),behandler:S.user?S.user.bId||'hFeld':'hFeld',codes:[],text:combined,voice:true});
  }
  /* Mark current task done */
  if(!S.doneTaskIds)S.doneTaskIds={};
  S.doneTaskIds[m.key]=true;
  /* Create follow-up task if Weiterbehandlung selected */
  var toastText=m.patName+': Erledigt';

    var assignee=USERS.find(function(u){return u.email===wBhId});
    var assigneeBhId=(assignee&&assignee.bId)?assignee.bId:(function(){
      var orig=TASKS.find(function(t){return t.name===p.name});
      return orig?orig.bh:'hFeld';

    var taskDate=wDate||fmtShort(new Date(TODAY.getTime()+7*D));
    var dateParts=taskDate.split('-');
    var prettyDate=dateParts.length===3?dateParts[2]+'.'+dateParts[1]+'.':taskDate;
    var taskDateObj=new Date(taskDate);
    var isNextWeek=taskDateObj.getTime()>TODAY.getTime()+D;
    TASKS.push({
      id:nextId++,
      bh:assigneeBhId,
      name:p.name,
      heim:heimName(p.heim),
      behandlung:wBeh,
      status:'offen',
      week:isNextWeek?'next':'current',
      date:dateParts.length===3?dateParts[2]+'.'+dateParts[1]+'.':fmtShort(new Date(TODAY.getTime()+7*D))
    });
    var who=assignee?assignee.name:'Behandler';
    toastText+=' \u00b7 '+wBeh+': '+prettyDate+' ('+who+')';

/* Home route — distance matrix & nearest-neighbor renderer for the 4 home HEIME */
var HOME_HEIM_T={
  "Alexa Lichtenrade":       {"Alexa Lichtenrade":0,"Haus am Weigandufer":25,"Vitanas M\u00e4rkisches V.":30,"Senterra Alloheim":35},
  "Haus am Weigandufer":     {"Alexa Lichtenrade":25,"Haus am Weigandufer":0, "Vitanas M\u00e4rkisches V.":20,"Senterra Alloheim":50},
  "Vitanas M\u00e4rkisches V.": {"Alexa Lichtenrade":30,"Haus am Weigandufer":20,"Vitanas M\u00e4rkisches V.":0, "Senterra Alloheim":25},
  "Senterra Alloheim":       {"Alexa Lichtenrade":35,"Haus am Weigandufer":50,"Vitanas M\u00e4rkisches V.":25,"Senterra Alloheim":0}
};
function homeRouteTime(a,b){return(HOME_HEIM_T[a]&&HOME_HEIM_T[a][b]!==undefined)?HOME_HEIM_T[a][b]:null}
function renderHomeRoute(names){
  var uniq=[];names.forEach(function(n){if(uniq.indexOf(n)===-1)uniq.push(n)});
  if(uniq.length===0)return'';
  /* nearest-neighbor ordering */
  var rem=uniq.slice(),ordered=[rem.shift()];
  while(rem.length){
    var last=ordered[ordered.length-1],bi=0;
    for(var i=1;i<rem.length;i++){
      var da=homeRouteTime(last,rem[i]),db=homeRouteTime(last,rem[bi]);
      if((da==null?999:da)<(db==null?999:db))bi=i;
    }
    ordered.push(rem.splice(bi,1)[0]);
  }
  var total=0;
  for(var j=0;j<ordered.length-1;j++){var m=homeRouteTime(ordered[j],ordered[j+1]);if(typeof m==='number')total+=m}
  var h='<div class="route-box" style="margin:0 0 12px">'
    +'<div class="route-header">'

function catPatient(p){
  var u=p.ze?urg(p.ze.exp):"ok";
  if(u==="expired"||u==="urgent"||p.tx.indexOf("notfall")!==-1)return"notfall";
  if(p.ze&&p.ze.st<10)return"ze";
  if(p.pa)return"pa";
  return"kons";
}

  var u=p.ze?urg(p.ze.exp):"ok";
  var h='<div class="card" onclick="goPat('+p.id+')"><div class="card-row"><div><div class="card-title">'+p.name+'</div><div class="card-sub">Zi. '+p.room+' \u2014 '+p.age+' J.</div></div><span class="chevron" style="width:20px;height:20px;display:flex;align-items:center">'+ICO.arrow+'</span></div><div class="badges">';
  p.tx.forEach(function(t){h+=badge("treat",t.toUpperCase())});

  if(p.pa){var ps=PA_STEPS.find(function(x){return x.id===p.pa.step});h+='<span class="badge" style="background:var(--blue-50);color:var(--navy)">PA: '+(ps?ps.label:"")+'</span>'}
  if(u==="expired")h+=badge("urgent","Abgelaufen");

  h+='</div></div>';return h;
}

/* ===== PA PIANO LAYOUT (unified) ===== */
function renderPianoLayout(p){
  if(!p.pa||!p.pa.befund)return'';
  var sp=p.pa.befund.spiegel||{};var bop=p.pa.befund.bop||{};var lok=p.pa.befund.lockerung||{};
  function dc(v){if(v===null||v===undefined)return'';if(v>=6)return' pa-v-crit';if(v>=4)return' pa-v-warn';return' pa-v-ok'}
  function unifiedRow(teeth,jawLabel){
    var h='<div class="pa-piano-jaw-label">'+jawLabel+'</div><div class="pa-piano-row">';
    for(var i=0;i<teeth.length;i++){
      var n=teeth[i];var present=isToothPresent(p,n);
      if(i===8)h+='<div class="pa-piano-sep"></div>';
      var m=sp[n]?sp[n][0]:null;var d=sp[n]?sp[n][1]:null;
      var isActive=S.paInlineEdit&&S.paInlineTooth===n;
      var mEdit=isActive&&S.paInlineField==="mesial";
      var dEdit=isActive&&S.paInlineField==="distal";
      var hasBop=bop[n]?true:false;
      var lv=lok[n]||0;
      h+='<div class="pa-piano-cell'+(present?'':' absent')+'">';
      h+='<div class="pa-tn">'+n+'</div>';
      /* M/D values — tap for numpad */
      h+='<div class="pa-vals'+(isActive?' active':'')+'" onclick="'+(present?"selectPianoCell("+n+",'mesial');event.stopPropagation()":"")+'">';
      h+='<div class="pa-vm'+dc(m)+(mEdit?' editing':'')+'">'+(m!==null?m:'\u2013')+'</div>';
      h+='<div class="pa-vsep">\u2500</div>';
      h+='<div class="pa-vd'+dc(d)+(dEdit?' editing':'')+'">'+(d!==null?d:'\u2013')+'</div>';
      h+='</div>';
      /* BOP dot — tap to toggle */
      h+='<div class="pa-bop-dot'+(hasBop?' active':'')+'" onclick="'+(present?"togglePianoBop("+n+");event.stopPropagation()":"")+'"></div>';
      /* Lok grade — tap to cycle */
      h+='<div class="pa-lok-val'+(lv>0?' lok-'+lv:'')+'" onclick="'+(present?"cyclePianoLok("+n+");event.stopPropagation()":"")+'">'+lokLabel(lv)+'</div>';
      h+='</div>';
    }
    h+='</div>';return h;
  }
  var h='<div class="pa-piano-section">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div class="pa-piano-label" style="margin:0">PA-Befund</div><div style="font-size:8px;color:var(--text-4)">M\u2502D \u00b7 BOP \u00b7 Lok</div></div>';
  h+=unifiedRow(OK_PIANO,'OK');
  h+=unifiedRow(UK_PIANO,'UK');
  /* Furkation row (molars only) */
  var MOLARS_OK=[18,17,16,26,27,28];var MOLARS_UK=[48,47,46,36,37,38];
  var furk=p.pa.befund.furkation||{};
  var FURK_LABELS=["F0","FI","FII","FIII"];
  function furkRow(molars,jawLbl){
    var fh='<div style="font-size:8px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">Furkation '+jawLbl+'</div><div class="pa-furk-row">';
    molars.forEach(function(n){var fv=furk[n]||0;var cls=fv>=3?"fk-3":fv===2?"fk-2":fv===1?"fk-1":"";
      fh+='<div class="pa-furk-cell" onclick="cyclePianoFurk('+n+')">';
      fh+='<div class="pa-tn">'+n+'</div>';
      fh+='<div class="pa-furk-val '+cls+'">'+FURK_LABELS[fv]+'</div>';
      fh+='</div>';
    });
    fh+='</div>';return fh;
  }
  h+=furkRow(MOLARS_OK,'OK');
  h+=furkRow(MOLARS_UK,'UK');
  /* Inline numpad */
  if(S.paInlineEdit){
    h+='<div class="pa-inline-numpad"><div class="pa-np-label">Zahn '+S.paInlineTooth+' ('+(S.paInlineField==="mesial"?'M':'D')+')</div><div class="pa-np-grid">';
    for(var i=1;i<=9;i++)h+='<button onclick="setPianoDepth('+i+')">'+i+'</button>';
    h+='<button onclick="setPianoDepth(0)">0</button>';
    h+='</div><div style="display:flex;justify-content:center;margin-top:8px"><button style="padding:6px 16px;background:var(--surface-2);color:var(--text-3);border:1px solid var(--border);border-radius:var(--r-full);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit" onclick="closePianoEdit()">Fertig</button></div></div>';
  }
  /* Summary stats */
  var totalTeeth=0;var deepPockets=0;var bopCount=0;var mobileTeeth=0;
  OK_PIANO.concat(UK_PIANO).forEach(function(n){
    if(!isToothPresent(p,n))return;
    if(sp[n]){totalTeeth++;if(sp[n][0]>=4||sp[n][1]>=4)deepPockets++};
    if(bop[n])bopCount++;if(lok[n]&&lok[n]>0)mobileTeeth++;
  });
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">';
  h+='<span style="padding:3px 8px;border-radius:var(--r-full);font-size:9px;font-weight:600;background:var(--surface-2);color:var(--text-3)">'+totalTeeth+' Z\u00e4hne</span>';
  if(deepPockets>0)h+='<span style="padding:3px 8px;border-radius:var(--r-full);font-size:9px;font-weight:600;background:var(--amber-bg);color:var(--amber)">\u22654mm: '+deepPockets+'</span>';
  if(bopCount>0)h+='<span style="padding:3px 8px;border-radius:var(--r-full);font-size:9px;font-weight:600;background:var(--crimson-bg);color:var(--crimson)">BOP: '+bopCount+'</span>';
  if(mobileTeeth>0)h+='<span style="padding:3px 8px;border-radius:var(--r-full);font-size:9px;font-weight:600;background:var(--amber-bg);color:var(--amber)">Mobil: '+mobileTeeth+'</span>';
  h+='</div></div>';
  return h;
}

/* ===== PA §22a RENDER (legacy grid) ===== */
function renderSondierungGrid(spiegel,bop,odo){
  function getTeeth(arr,start,dir){var t=[];for(var i=0;i<8;i++){var n=dir===1?start+i:start-i;var pr=arr[i]!=="ex";var m=spiegel&&spiegel[n]?spiegel[n][0]:null;var d=spiegel&&spiegel[n]?spiegel[n][1]:null;var b=bop&&bop[n]?true:false;t.push({n:n,p:pr,m:m,d:d,b:b})}return t}
  function jawHtml(teeth){
    var h='<div class="pa-grid" style="grid-template-columns:32px repeat('+teeth.length+',1fr)">';
    h+='<div class="pa-gc hdr"></div>';teeth.forEach(function(t){h+='<div class="pa-gc hdr">'+(t.p?t.n:"")+'</div>'});
    h+='<div class="pa-gc lbl">M</div>';teeth.forEach(function(t){h+='<div class="pa-gc'+(t.p&&t.m!==null?(t.m>=5?" dp":t.m>=4?" md":""):" ext")+'">'+(t.p&&t.m!==null?t.m:"")+'</div>'});
    h+='<div class="pa-gc lbl">D</div>';teeth.forEach(function(t){h+='<div class="pa-gc'+(t.p&&t.d!==null?(t.d>=5?" dp":t.d>=4?" md":""):" ext")+'">'+(t.p&&t.d!==null?t.d:"")+'</div>'});

  var upper=getTeeth(odo.tl,18,-1).concat(getTeeth(odo.tr,21,1));

  h+=jawHtml(lower);
  h+='</div>';return h}

function getLabFiltered(){

  else if(f==="letzterMonat")items=items.filter(function(x){return x.created>=N-30*D});
  else if(f==="vollprothese")items=items.filter(function(x){return x.prothType==="Totalprothese"||x.prothType==="Teilprothese"});

}

function setOdoStatus(code){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  var map={"E":"e","Ex":"ex","F":"f","F\u00fc":"fu","G":"g","C":"c","Kr":"kr","B":"b","I":"i","T":"t","Wr":"wr","Z":"z","st":"st","ph":"ph","rt":"rt"};
  var arr=getQArr(p.odo,S.odoQ||1);var idx=S.odoSelTooth||0;
  /* Modifiers (+)/(-) append to current value */
  if(code==="(+)"||code==="(\u2212)"){
    var cur=arr[idx]||"";var modCode=code==="(+)"?"vp":"vn";
    /* Remove existing vitality modifier first */
    cur=cur.replace(/\+v[pn]/g,"");
    if(cur)arr[idx]=cur+"+"+modCode;
    render();return;
  }
  var val=map[code]||code.toLowerCase();
  arr[idx]=val;
  /* Auto-advance */
  if(idx<7)S.odoSelTooth=idx+1;
  render();
}
function clearOdoStatus(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  var arr=getQArr(p.odo,S.odoQ||1);arr[S.odoSelTooth||0]=null;render();
}

function odoSaveAndClose(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});
  if(p)odoAutoSave(p);
  S.odoEdit=false;render();
}
function odoAutoSave(p){
  if(!p)return;
  var today=new Date();today.setHours(0,0,0,0);var todayMs=today.getTime();
  var snap=JSON.parse(JSON.stringify(p.odo));
  /* Check if we already have a save for today */
  var found=false;
  for(var i=0;i<p.odoHist.length;i++){
    var hd=new Date(p.odoHist[i].date);hd.setHours(0,0,0,0);
    if(hd.getTime()===todayMs){p.odoHist[i].odo=snap;found=true;break;}
  }
  if(!found)p.odoHist.push({date:Date.now(),odo:snap});
}
function restoreOdoHist(patId,idx){
  var p=PATIENTS.find(function(x){return x.id===patId});if(!p)return;
  if(idx===""||idx===null){render();return;}
  var sorted=p.odoHist.slice().sort(function(a,b){return b.date-a.date});
  var entry=sorted[parseInt(idx)];
  if(entry){p.odo=JSON.parse(JSON.stringify(entry.odo))}
  render();
}

function addTx(toothNr,code){
  if(toothNr===null)return;
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  if(!p.txPlan)p.txPlan={};if(!p.txPlan[toothNr])p.txPlan[toothNr]=[];
  if(p.txPlan[toothNr].indexOf(code)===-1)p.txPlan[toothNr].push(code);
  render();
}
function removeTx(toothNr,idx){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.txPlan||!p.txPlan[toothNr])return;
  p.txPlan[toothNr].splice(idx,1);
  if(p.txPlan[toothNr].length===0)delete p.txPlan[toothNr];
  render();
}
function completeTxTooth(toothNr){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.txPlan||!p.txPlan[toothNr])return;
  var codes=p.txPlan[toothNr].slice();
  /* Add visit documentation */
  if(!p.visits)p.visits=[];
  p.visits.unshift({date:Date.now(),behandler:S.user?S.user.bId||"hFeld":"hFeld",codes:codes,text:"Behandlung Zahn "+toothNr+": "+codes.map(function(c){return c.toUpperCase()}).join(", ")+" durchgef\u00fchrt.",voice:false});
  /* Auto-update tooth status based on treatment */
  codes.forEach(function(c){
    var statusMap={"ex":"ex","fu":"fu","e":"e","st":"st","ph":"ph","ekr":"g","ta":"g"};
    if(statusMap[c]){
      if(toothNr>=11&&toothNr<=18)p.odo.tl[18-toothNr]=statusMap[c];
      else if(toothNr>=21&&toothNr<=28)p.odo.tr[toothNr-21]=statusMap[c];

    }
  });
  /* Remove completed treatments */
  delete p.txPlan[toothNr];
  /* Auto-save odontogram */

  S.txSelTooth=null;

/* ===== ZE CREATION ===== */
function createZeCase(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p)return;
  p.ze={st:0,type:"Befund",zs:0,exp:null,bh:S.user&&S.user.bId?S.user.bId:"hFeld",comments:[],planned:{}};
  render();
}
function zeAdvance(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze)return;
  var oldSt=p.ze.st;
  if(p.ze.st<ZE_STATES.length-1){
    p.ze.st++;
    /* Abdruck (stage 6) → auto-create Lab item */
    if(p.ze.st===6){
      var nid=LAB_ITEMS.reduce(function(m,x){return Math.max(m,x.id)},0)+1;
      LAB_ITEMS.push({id:nid,patId:p.id,patName:p.name,type:p.ze.type,prothType:"Totalprothese",jaw:"OK",heim:p.heim,bh:p.ze.bh,stage:0,tech:LAB_TECHS[0],vita:null,teeth:[],note:"Auto-erstellt bei Abdruck",created:Date.now(),completed:null,phase:"test"});
      MESSAGES.unshift({id:MESSAGES.length+100,type:"nudge",from:"System",to:["labor"],title:"Neuer Laborauftrag: "+p.name,body:"Abdruck genommen f\u00fcr "+p.ze.type+". Laborauftrag automatisch erstellt.",patId:p.id,tag:"lab",time:Date.now(),read:false});
    }
    /* HKP bewilligt (stage 5) → set expiry 6 months */
    if(p.ze.st===5&&!p.ze.exp){p.ze.exp=Date.now()+180*D}
    /* Zustimmung requested (stage 1) → notify Verwaltung */
    if(p.ze.st===1){
      MESSAGES.unshift({id:MESSAGES.length+100,type:"nudge",from:"System",to:["verwaltung","ceo"],title:"Zustimmung angefragt: "+p.name,body:"Behandlungsplan erstellt f\u00fcr "+p.ze.type+". Bitte an Betreuer zur Unterschrift senden.",patId:p.id,tag:"hkp",time:Date.now(),read:false});
    }
    /* Fertig (stage 10) → archive */
    if(p.ze.st===10){
      if(!p.zeArchive)p.zeArchive=[];
      p.zeArchive.push({type:p.ze.type,zs:p.ze.zs,bh:p.ze.bh,completed:Date.now(),comments:p.ze.comments?p.ze.comments.slice():[]});
    }
  }
  showToast('ZE-Fall '+p.name+': '+ZE_STATES[p.ze.st]);
}
function zeRevert(){
  var p=PATIENTS.find(function(x){return x.id===S.patId});if(!p||!p.ze||p.ze.st<=0)return;
  p.ze.st--;render();
}

  var ta=document.getElementById("zeComment");if(!ta||!ta.value.trim())return;

var DAY = 86400000;

function fmtLong(d){ return d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function getKW(d){
  var jan4=new Date(d.getFullYear(),0,4);
  var startWeek=new Date(jan4.getTime()-((jan4.getDay()||7)-1)*DAY);
  return Math.ceil((d-startWeek)/7/DAY)+1;
}
function nextMonday(){
  var d=new Date(TODAY); var dow=d.getDay()||7;
  d.setDate(d.getDate()+(8-dow));

}
function weekRange(start){
  var end=new Date(start.getTime()+6*DAY);
  return 'KW '+getKW(start)+' \u00b7 '+start.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+'\u2013'+end.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

/* === BEHANDLER SECTION === */
function dateStrToSortKey(s){
  var m=s.match(/(\d{2})\.(\d{2})\./);
  if(!m)return 0;
  return parseInt(m[2],10)*100+parseInt(m[1],10);
}
function bhSection(bh,tasks,badgeClass,badgeLabel,weekParam){
  var isOpen=S.openBh_2[bh.id];
  var chevCls=isOpen?'chevron open':'chevron';
  var bodyCls=isOpen?'bh-body open':'bh-body';
  var todayStr=fmtShort(TODAY);
  var inner='';
  if(tasks.length===0){
    inner='<div class="task-empty">Keine Aufgaben</div>';
  } else {
    /* group by date */
    var dateMap={};
    tasks.forEach(function(t){if(!dateMap[t.date])dateMap[t.date]=[];dateMap[t.date].push(t);});
    var dates=Object.keys(dateMap).sort(function(a,b){return dateStrToSortKey(a)-dateStrToSortKey(b);});
    dates.forEach(function(d){
      inner+='<div class="day-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+d+'</div>';
      /* route directly under the date label */
      if(weekParam==='current'&&d===todayStr){
        var todayHeims=[];
        dateMap[d].forEach(function(t){if(todayHeims.indexOf(t.heim)===-1)todayHeims.push(t.heim);});
        inner+=renderRouteHeims(todayHeims);
      }
      /* tasks sorted by Pflegeheim */
      var sorted=dateMap[d].slice().sort(function(a,b){return a.heim.localeCompare(b.heim,'de');});
      sorted.forEach(function(t){inner+=taskCard(t);});
    });
  }
  return '<div class="bh-section">'
    +'<div class="bh-header" onclick="toggleBh(\''+bh.id+'\')">'
      +'<div class="bh-avatar">'+bhInitials(bh)+'</div>'
      +'<div class="bh-name">'+bh.name+'</div>'
      +'<div class="bh-badge '+badgeClass+'">'+badgeLabel+'</div>'
      +'<span class="'+chevCls+'">&#9660;</span>'
    +'</div>'
    +'<div class="'+bodyCls+'"><div class="task-list">'+inner+'</div></div>'
  +'</div>';
}

var HEIM_T={
  'Alexa Lichtenrade':  {'Alexa Lichtenrade':0, 'Haus am Waldsee':22,'Vitanas Lankwitz':10,'Senterra Tempelhof':14},
  'Haus am Waldsee':    {'Alexa Lichtenrade':22,'Haus am Waldsee':0, 'Vitanas Lankwitz':16,'Senterra Tempelhof':20},

  'Senterra Tempelhof': {'Alexa Lichtenrade':14,'Haus am Waldsee':20,'Vitanas Lankwitz':10,'Senterra Tempelhof':0}
};
/* Extend HEIM_T with the home HEIME names so the Verwaltung route box works on the synced TASKS
   (which now use home heim names: Haus am Weigandufer, Vitanas Märkisches V., Senterra Alloheim). */
HEIM_T['Haus am Weigandufer']=HOME_HEIM_T['Haus am Weigandufer'];
HEIM_T['Vitanas M\u00e4rkisches V.']=HOME_HEIM_T['Vitanas M\u00e4rkisches V.'];
HEIM_T['Senterra Alloheim']=HOME_HEIM_T['Senterra Alloheim'];
HEIM_T['Alexa Lichtenrade']['Haus am Weigandufer']=HOME_HEIM_T['Alexa Lichtenrade']['Haus am Weigandufer'];
HEIM_T['Alexa Lichtenrade']['Vitanas M\u00e4rkisches V.']=HOME_HEIM_T['Alexa Lichtenrade']['Vitanas M\u00e4rkisches V.'];
HEIM_T['Alexa Lichtenrade']['Senterra Alloheim']=HOME_HEIM_T['Alexa Lichtenrade']['Senterra Alloheim'];
function nearestRoute(heime){
  if(heime.length<=1)return heime.slice();
  var rem=heime.slice(),route=[rem.splice(0,1)[0]];
  while(rem.length){
    var last=route[route.length-1];
    var best=rem.reduce(function(a,b){
      return(HEIM_T[last]&&HEIM_T[last][b]!==undefined?HEIM_T[last][b]:99)<(HEIM_T[last]&&HEIM_T[last][a]!==undefined?HEIM_T[last][a]:99)?b:a;
    });
    route.push(best);rem.splice(rem.indexOf(best),1);
  }
  return route;
}
function routeTime(a,b){return(HEIM_T[a]&&HEIM_T[a][b]!==undefined)?HEIM_T[a][b]:'-';}
function renderRouteHeims(heims){
  if(heims.length===0)return'';
  var ordered=nearestRoute(heims);
  var totalMin=0;
  for(var i=0;i<ordered.length-1;i++){var m=routeTime(ordered[i],ordered[i+1]);if(typeof m==='number')totalMin+=m;}
  var h='<div class="route-box">'
    +'<div class="route-header">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>'
      +'Empfohlene Route'
      +(totalMin>0?'<span class="route-total">~'+totalMin+' Min. gesamt</span>':'')
    +'</div>'
    +'<div class="route-stops">';
  ordered.forEach(function(heim,i){
    var addr=heimAddr(heim);
    h+='<div class="route-stop">'
      +'<div class="route-stop-left">'
        +'<div class="route-dot"></div>'
        +(i<ordered.length-1?'<div class="route-line"></div>':'')
      +'</div>'
      +'<div class="route-stop-body">'
        +'<div class="route-stop-name">'+heim+'</div>'
        +(addr?'<div class="route-stop-addr">'+addr+'</div>':'')
        +(i<ordered.length-1?'<div class="route-stop-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> '+routeTime(ordered[i],ordered[i+1])+' Min. weiter</div>':'')
      +'</div>'
    +'</div>';
  });
  h+='</div></div>';
  return h;
}
function renderRoute(bhId,week){
  var tasks=TASKS.filter(function(t){return t.bh===bhId&&t.week===week;});
  var heims=[];
  tasks.forEach(function(t){if(heims.indexOf(t.heim)===-1)heims.push(t.heim);});
  return renderRouteHeims(heims);
}

function openZEEdit(idx,mode,src){
  S.reassignIdx_2=idx;
  S.reassignSrc_2=src||'ze';
  S._zeMode=mode||'termin';
  var rec=src==='ex'?EX_PATIENTEN[idx]:ZE_FAELLE[idx];
  S.reassignForm_2={bh:rec&&rec.bh?rec.bh:'',date:rec&&rec.date?rec.date:'',behandlung:''};

function closeReassign(){S.reassignIdx_2=null;render();}
function saveReassign(){
  var f=S.reassignForm_2;
  var src2=S.reassignSrc_2||'offen';
  var isZE=src2==='ze', isEX=src2==='ex';
  if(!f.bh){S.reassignErr_2='Bitte Behandler ausw\u00e4hlen.';render();return;}
  if(!isZE&&!isEX&&!f.behandlung){S.reassignErr_2='Bitte Behandlung ausw\u00e4hlen.';render();return;}
  var dateStr=f.date?new Date(f.date).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}):fmtShort(TODAY);
  if(isZE||isEX){
    var rec=isEX?EX_PATIENTEN[S.reassignIdx_2]:ZE_FAELLE[S.reassignIdx_2];
    if(rec){rec.bh=f.bh;rec.date=dateStr;}
    S.reassignIdx_2=null;
    S.meinTab_2=isEX?'ex':'ze';
    render();
    return;
  }
  var arr=src2==='pa'?PA_FAELLE:src2==='weiterfuehrend'?WEITERFUEHREND_PAT:OFFEN_PAT;
  var p=arr[S.reassignIdx_2];
  var taskDate=f.date?new Date(f.date):TODAY;
  var weekDiff=Math.floor((taskDate.getTime()-TODAY.getTime())/DAY);
  var taskWeek=weekDiff>=7?'next':'current';
  TASKS.push({id:nextId++,bh:f.bh,name:p.name,heim:p.heim,behandlung:f.behandlung,status:'offen',week:taskWeek,date:dateStr});
  arr.splice(S.reassignIdx_2,1);
  S.openBh_2[f.bh]=true;
  S.reassignIdx_2=null;
  S.tab_2=taskWeek==='next'?'woche':'uebersicht';
  S.filter_2='offen';
  render();
}

function saveTask(){
  var f=S.addForm_2;
  var name='',heim=f.heim;
  if(f.patType==='existing'){
    if(!f.existingPatId){S.addErr_2='Bitte Patient ausw\u00e4hlen.';document.getElementById('addErr').style.display='block';return;}
    var ep=EXISTING_PATIENTS.find(function(p){return p.id===f.existingPatId});
    name=ep.name;heim=ep.heim;
  } else {
    if(!f.nachname.trim()||!f.vorname.trim()){S.addErr_2='Bitte Vor- und Nachname eingeben.';document.getElementById('addErr').style.display='block';return;}
    name=f.nachname.trim()+', '+f.vorname.trim();
  }
  if(!f.behandlung){S.addErr_2='Bitte Behandlung w\u00e4hlen.';document.getElementById('addErr').style.display='block';return;}
  if(!f.bh){S.addErr_2='Bitte Behandler zuweisen.';document.getElementById('addErr').style.display='block';return;}
  if(!heim){S.addErr_2='Bitte Pflegeheim w\u00e4hlen.';document.getElementById('addErr').style.display='block';return;}
  var taskDate=f.date?new Date(f.date):TODAY;
  var dateStr=f.date?taskDate.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}):fmtShort(TODAY);
  var taskWeek=Math.floor((taskDate.getTime()-TODAY.getTime())/DAY)>=7?'next':'current';
  TASKS.push({id:nextId++,bh:f.bh,name:name,heim:heim,behandlung:f.behandlung,status:f.status,week:taskWeek,date:dateStr});
  S.openBh_2[f.bh]=true;
  S.showAdd_2=false;
  S.tab_2=taskWeek==='next'?'woche':'uebersicht';
  if(taskWeek==='current')S.filter_2=f.status;
  render();
}

function labPhaseLabel_2(it){return it.phase==="test"?"TEST-":"FINALE ";}

function getLabFiltered_2(){
  var items=LAB_ITEMS;
  if(S.labFilter_2==="offen")items=items.filter(function(x){return !x.completed});
  else if(S.labFilter_2==="nichtFertig")items=items.filter(function(x){return x.stage<3});
  else if(S.labFilter_2==="letzterMonat")items=items.filter(function(x){return x.completed&&(N-x.completed)<30*D});
  else if(S.labFilter_2==="vollprothese")items=items.filter(function(x){return x.prothType==="Totalprothese"||x.prothType==="Teilprothese"});
  if(S.labSearch_2){var q=S.labSearch_2.toLowerCase();items=items.filter(function(x){return(x.patName||"").toLowerCase().indexOf(q)!==-1||(x.type||"").toLowerCase().indexOf(q)!==-1||(x.tech||"").toLowerCase().indexOf(q)!==-1});}
  return items;
}

  var email=(emailEl?emailEl.value:f.email||'').trim().toLowerCase();
  var name=(nameEl?nameEl.value:f.name||'').trim();
  var pw=(pwEl?pwEl.value:f.pw||'');
  if(!email||!name||!pw){showToast('E-Mail, Name und Passwort sind Pflichtfelder','var(--crimson)');return}
  if(USERS.find(function(u){return u.email===email})){showToast('E-Mail bereits vergeben','var(--crimson)');return}
  /* Derive a stable bId from the last word of the name, avoiding collisions */
  var parts=name.split(/\s+/);
  var last=parts[parts.length-1].replace(/[^A-Za-z\u00c0-\u024f]/g,'')||'neu';
  var base='h'+last.charAt(0).toUpperCase()+last.slice(1).toLowerCase();
  var bId=base,i=1;
  while(BEHANDLER.find(function(b){return b.id===bId})){bId=base+i;i++}
  BEHANDLER.push({id:bId,name:name,cases:0,avgDays:0,done:0});
  USERS.push({email:email,pw:pw,name:name,role:'behandler',bId:bId});
  S.showAddBehandler=false;
  showToast(name+' hinzugef\u00fcgt','var(--emerald)');
}

function closeEditBehandler(){S.editBehandler=null;render()}
function saveEditBehandler(){
  var e=S.editBehandler;
  if(!e)return;
  var emailEl=document.getElementById('ebEmail');
  var pwEl=document.getElementById('ebPw');
  var roleEl=document.getElementById('ebRole');
  var email=(emailEl?emailEl.value:'').trim().toLowerCase();
  var pw=(pwEl?pwEl.value:'');
  var role=(roleEl?roleEl.value:'behandler');
  if(!email||!pw||!role){showToast('Alle Felder sind Pflichtfelder','var(--crimson)');return}
  /* Email must not clash with a DIFFERENT user */
  var dup=USERS.find(function(u){return u.email===email&&u.bId!==e.bhId});
  if(dup){showToast('E-Mail bereits vergeben','var(--crimson)');return}
  var user=USERS.find(function(u){return u.bId===e.bhId});
  if(user){
    user.email=email;
    user.pw=pw;
    user.role=role;
  } else {
    /* No user account yet for this Behandler — create one */
    USERS.push({email:email,pw:pw,name:e.bhName,role:role,bId:e.bhId});
  }
  S.editBehandler=null;
  showToast(e.bhName+' aktualisiert','var(--emerald)');
}

function saveEinvAdd(){
  var f=S.einvAddForm_2;

    if(!f.existingPatId){S.einvAddErr_2='Bitte Patient ausw\u00e4hlen.';render();return;}
    var ep=EXISTING_PATIENTS.find(function(p){return p.id===f.existingPatId;});

  } else {
    if(!f.nachname.trim()||!f.vorname.trim()){S.einvAddErr_2='Bitte Vor- und Nachname eingeben.';render();return;}
    name=f.nachname.trim()+', '+f.vorname.trim();

  if(!heim){S.einvAddErr_2='Bitte Pflegeheim ausw\u00e4hlen.';render();return;}
  if(!f.ok&&!f.uk&&!f.okExtras.length&&!f.ukExtras.length){S.einvAddErr_2='Bitte mindestens eine Kieferbehandlung ausw\u00e4hlen.';render();return;}

        +'<button class="archiv-month-btn'+(cm===null?' active':'')+'" onclick="S.archivMonth_2=null;render()">Alle ('+yearRecs.length+')</button>';

        var cnt=yearRecs.filter(function(p){return p.archivedDate.substr(5,2)===m;}).length;
        h+='<button class="archiv-month-btn'+(cm===m?' active':'')+'" onclick="S.archivMonth_2=\''+m+'\';render()">'+MONTH_NAMES[parseInt(m)-1]+' ('+cnt+')</button>';

        h+='<div style="padding:40px;text-align:center;color:var(--text-4);font-size:12px;font-style:italic">Keine Eintr\u00e4ge</div>';

  h+='<div style="margin-top:4px;padding:10px 12px;background:var(--surface-2);border-radius:var(--r-md);font-size:10px;color:var(--text-3);line-height:1.5">'
    +'Preise direkt bearbeitbar. HF\u00a0= H\u00e4rtefall (KK zahlt 100\u00a0%, kein Eigenanteil).'
  +'</div>';
  h+='</div>';
  h+=renderAbrechnungNav('zepreisliste');
  return h;
}

/* === PFLEGEHEIME === */
function openHeimEdit(i){
  S.heimEdit_2=i;
  var ph=i===-1?{name:'',strasse:'',plz:''}:PFLEGEHEIME[i];
  S.heimEditForm_2={name:ph.name,strasse:ph.strasse,plz:ph.plz};
  render();
}
function saveHeimEdit(){
  var f=S.heimEditForm_2;
  if(!f.name.trim())return;
  if(S.heimEdit_2===-1){PFLEGEHEIME.push({name:f.name.trim(),strasse:f.strasse.trim(),plz:f.plz.trim()});}
  else{PFLEGEHEIME[S.heimEdit_2]={name:f.name.trim(),strasse:f.strasse.trim(),plz:f.plz.trim()};}
  S.heimEdit_2=null;render();
}
function deleteHeimEdit(){PFLEGEHEIME.splice(S.heimEdit_2,1);S.heimEdit_2=null;render();}
function renderPflegeheime(){
  var sorted=PFLEGEHEIME.map(function(ph,i){return{ph:ph,i:i};}).sort(function(a,b){return a.ph.name.localeCompare(b.ph.name,'de');});
  var h='<div class="header"><div class="header-inner">'
    +'<div><h1>Pflegeheime</h1><div class="sub">'+PFLEGEHEIME.length+' Einrichtungen</div></div>'
    +MENU_BTN_2
  +'</div></div>';
  h+='<div class="content" style="overflow-y:auto">';
  sorted.forEach(function(obj){
    var ph=obj.ph,i=obj.i;
    h+='<button onclick="openHeimEdit('+i+')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:#fff;border:none;border-bottom:1px solid var(--border);cursor:pointer;font-family:inherit;text-align:left">'
      +'<div>'
        +'<div style="font-size:13px;font-weight:600;color:var(--navy)">'+ph.name+'</div>'
        +'<div style="font-size:11px;color:var(--text-3);margin-top:2px">'+ph.strasse+' &middot; '+ph.plz+'</div>'
      +'</div>'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="flex-shrink:0;color:var(--text-4)"><polyline points="9 18 15 12 9 6"/></svg>'
    +'</button>';
  });
  h+='<button onclick="openHeimEdit(-1)" style="width:100%;padding:14px 16px;background:none;border:none;border-top:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:8px;font-family:inherit">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'Pflegeheim hinzuf\u00fcgen'
  +'</button>';
  h+='</div>';
  h+=renderAbrechnungNav('pflegeheime');
  if(S.heimEdit_2!==null){
    var f=S.heimEditForm_2,isNew=S.heimEdit_2===-1;
    h+='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);z-index:200;border-radius:28px">'
      +'<div style="background:#fff;border-radius:var(--r-lg);padding:20px;width:calc(100% - 48px);box-shadow:0 8px 32px rgba(0,0,0,0.2)">'
        +'<div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px">'+(isNew?'Neues Pflegeheim':'Pflegeheim bearbeiten')+'</div>'
        +'<div style="font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px">Name</div>'
        +'<input class="form-input" value="'+f.name.replace(/"/g,'&quot;')+'" placeholder="Name des Pflegeheims" oninput="S.heimEditForm_2.name=this.value" style="width:100%;box-sizing:border-box;margin-bottom:10px">'
        +'<div style="font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px">Stra\u00dfe</div>'
        +'<input class="form-input" value="'+f.strasse.replace(/"/g,'&quot;')+'" placeholder="Stra\u00dfe und Hausnummer" oninput="S.heimEditForm_2.strasse=this.value" style="width:100%;box-sizing:border-box;margin-bottom:10px">'
        +'<div style="font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px">PLZ / Ort</div>'
        +'<input class="form-input" value="'+f.plz.replace(/"/g,'&quot;')+'" placeholder="PLZ und Ort" oninput="S.heimEditForm_2.plz=this.value" style="width:100%;box-sizing:border-box;margin-bottom:16px">'
        +'<div style="display:flex;gap:8px">'
          +(isNew?'':'<button onclick="deleteHeimEdit()" style="padding:10px 14px;border:1.5px solid var(--crimson);border-radius:var(--r-md);background:none;color:var(--crimson);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">L\u00f6schen</button>')
          +'<button onclick="S.heimEdit_2=null;render()" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--r-md);background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-2)">Abbrechen</button>'
          +'<button onclick="saveHeimEdit()" style="flex:1;padding:10px;border:none;border-radius:var(--r-md);background:var(--navy);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Speichern</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }
  return h;
}

/* === ADMIN RENDER (now renderAdminPortal_2 below) === */


/* ===== renderAdminPortal_2 — Admin Portal Main Dispatcher ===== */
function renderAdminPortal_2(){
  var app=document.getElementById('app');
  app.className='phone';
  var page=S.adminPage_2||'uebersicht';
  var html='';
  if(page==='uebersicht') html=renderHome_2();
  else if(page==='labor') html=renderLab_2();
  else if(page==='einverstaendnis') html=renderEinverstaendnis();
  else if(page==='archiv') html=renderArchiv();
  else if(page==='behandler') html=renderBehandler_2();
  else if(page==='abrechnung') html=renderAbrechnung();
  else if(page==='zepreisliste') html=renderZEPreisliste();
  else if(page==='texteditor') html=renderTexteditor();
  else if(page==='pflegeheime') html=renderPflegeheime();
  /* Admin hamburger */
  if(S.showMenu_2) html+=renderMenu_2();
  /* Overlays */
  if(S.showAdd_2) html+=renderAdd_2();
  if(S.reassignIdx_2!==null) html+=renderReassign();
  if(S.einvAdd_2) html+=renderEinvAdd();
  if(S.zugestimmtPopup_2!==null) html+=renderZugestimmtPopup();
  if(S.customPricePop_2) html+=renderCustomPricePopup();
  if(S.showAddBehandler) html+=renderAddBehandlerModal();
  if(S.editBehandler) html+=renderEditBehandlerModal();
  if(S.labCreate_2) html+=renderLabCreate_2();
  if(S.labDetail_2!==null&&!S.labCreate_2) html+=renderLabDetail_2();
  app.innerHTML=html;
}
